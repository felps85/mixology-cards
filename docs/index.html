<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mixology Cards</title>
    <meta
      name="description"
      content="A dark cocktail card showcase with recipes, curiosity facts, and static GitHub Pages browsing."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <section class="topbar" aria-label="Filters">
        <div class="topbar__brand" aria-hidden="true">
          <div class="topbar__mark">M</div>
          <div class="topbar__copy">
            <div class="topbar__title">Mixology Cards</div>
            <div class="topbar__subtitle">Speakeasy Index</div>
          </div>
        </div>

        <div class="controls">
          <label class="field field--search">
            <span class="sr-only">Search drinks</span>
            <input id="searchInput" type="search" placeholder="Search drinks..." />
          </label>
          <label class="field">
            <span class="sr-only">Alcohol</span>
            <select id="spiritFilter" aria-label="Alcohol">
              <option value="">Alcohol</option>
            </select>
          </label>
          <label class="field">
            <span class="sr-only">Tags</span>
            <select id="tagFilter" aria-label="Tags">
              <option value="">Tags</option>
            </select>
          </label>
          <label class="field">
            <span class="sr-only">Alcohol percentage</span>
            <select id="abvFilter" aria-label="Alcohol percentage">
              <option value="">%</option>
            </select>
          </label>
        </div>
      </section>

      <section class="stats">
        <div id="resultCount">Loading drinks…</div>
      </section>

      <main>
        <section id="grid" class="card-grid" aria-live="polite"></section>
      </main>
    </div>

    <dialog id="drinkDialog" class="drink-dialog">
      <div class="drink-dialog__content">
        <div class="drink-dialog__image-wrap">
          <img id="dialogImage" alt="" />
        </div>
        <div class="drink-dialog__body">
          <div class="dialog-header">
            <h2 id="dialogTitle"></h2>
            <button class="dialog-close" id="closeDialog" type="button" aria-label="Close">
              ×
            </button>
          </div>
          <div id="dialogMeta" class="dialog-meta"></div>
          <section class="dialog-panel">
            <div class="dialog-label">Curiosity</div>
            <p id="dialogCuriosity"></p>
          </section>
          <section class="dialog-section">
            <div class="dialog-section__header">
              <div class="dialog-label">Ingredients</div>
            </div>
            <ul id="dialogIngredients" class="ingredient-list"></ul>
          </section>
          <section class="dialog-section">
            <div class="dialog-label">Method</div>
            <ol id="dialogSteps" class="step-list"></ol>
          </section>
        </div>
      </div>
    </dialog>

    <script src="./app.js" defer></script>
  </body>
</html>
