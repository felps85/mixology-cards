<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mixology Cards</title>
    <meta
      name="description"
      content="A dark cocktail card gallery with filter dropdowns and fullscreen recipe details."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <section class="topbar" aria-label="Filters">
        <div class="topbar__toolbar">
          <div class="topbar__main">
            <div class="topbar__brand" aria-hidden="true">
              <button class="topbar__lead" type="button" tabindex="-1" aria-hidden="true">
                <img src="./logo.svg" alt="" class="topbar__logo" />
              </button>
              <div class="topbar__copy">
                <div class="topbar__title">Sipsmith</div>
                <div class="topbar__subtitle">Speakeasy Index</div>
              </div>
            </div>

            <div id="searchDock" class="searchDock">
              <div class="toolbarSearchUnified">
                <label class="search-shell">
                  <span class="sr-only">Search drinks</span>
                  <input id="searchInput" type="search" placeholder="Search drinks..." />
                </label>

                <div id="filterCluster" class="filter-cluster">
                  <button class="filter-btn" type="button" data-filter-button="ingredients">
                    <span>Ingredients</span>
                    <span class="filter-btn__count" data-count-for="ingredients"></span>
                    <span class="filter-btn__caret">▾</span>
                  </button>
                  <button class="filter-btn" type="button" data-filter-button="alcohol">
                    <span>Alcohol</span>
                    <span class="filter-btn__count" data-count-for="alcohol"></span>
                    <span class="filter-btn__caret">▾</span>
                  </button>
                  <button class="filter-btn" type="button" data-filter-button="tags">
                    <span>Tags</span>
                    <span class="filter-btn__count" data-count-for="tags"></span>
                    <span class="filter-btn__caret">▾</span>
                  </button>
                  <button class="filter-btn" type="button" data-filter-button="abv">
                    <span>%</span>
                    <span class="filter-btn__count" data-count-for="abv"></span>
                    <span class="filter-btn__caret">▾</span>
                  </button>
                </div>
              </div>
              <div id="dropdownPanel" class="dropdown-panel is-hidden" aria-live="polite"></div>
            </div>
          </div>
          <a
            class="buyButton buyButtonDesktop"
            href="https://buymeacoffee.com/agorafodeuy"
            target="_blank"
            rel="noreferrer"
          >
            Buy me a drink!
          </a>
        </div>

        <div id="activeFilters" class="active-filters is-hidden"></div>
      </section>

      <a
        class="buyButton buyButtonMobile"
        href="https://buymeacoffee.com/agorafodeuy"
        target="_blank"
        rel="noreferrer"
      >
        Buy me a drink!
      </a>

      <main>
        <section id="grid" class="card-grid" aria-live="polite"></section>
      </main>
    </div>

    <div id="drinkDialog" class="drink-dialog is-hidden" aria-hidden="true">
      <div class="drink-dialog__panel">
        <div class="drink-dialog__content">
        <div class="drink-dialog__image-wrap">
          <div id="dialogImageBackdrop" class="drink-dialog__image-backdrop" aria-hidden="true"></div>
          <img id="dialogImage" alt="" />
          <div id="dialogAccentBar" class="dialog-accent-bar" aria-hidden="true"></div>
        </div>
        <div class="drink-dialog__body">
          <div class="dialog-header">
            <div class="dialog-header__copy">
              <div class="dialog-eyebrow">Speakeasy Recipe Card</div>
              <h2 id="dialogTitle"></h2>
            </div>
            <button class="dialog-close" id="closeDialog" type="button" aria-label="Close">
              ×
            </button>
          </div>

          <div id="dialogMeta" class="dialog-meta"></div>

          <section class="dialog-panel">
            <div class="dialog-label">Curiosity</div>
            <p id="dialogCuriosity"></p>
          </section>

          <section class="dialog-section">
            <div class="dialog-section__header">
              <div class="dialog-label">Ingredients</div>
              <div id="dialogIngredientCount" class="dialog-section__count"></div>
            </div>
            <ul id="dialogIngredients" class="ingredient-list"></ul>
          </section>

          <section class="dialog-section">
            <div class="dialog-label">Method</div>
            <ol id="dialogSteps" class="step-list"></ol>
          </section>
        </div>
      </div>
      </div>
    </div>

    <script src="./app.js" defer></script>
    <script>
      (() => {
        const namespace = "felip-eu-portfolio";
        const activeBucketMs = 10000;
        const trimmed = (window.location.pathname || "/").replace(/\/index\.html$/, "/").replace(/\/+/g, "/");
        const route = trimmed === "" || trimmed === "/" ? "/" : trimmed.endsWith("/") ? trimmed : `${trimmed}/`;
        const counter = route === "/" ? "home" : route.replace(/^\/|\/$/g, "").toLowerCase().replace(/[^a-z0-9/_-]+/g, "-").replace(/\//g, "__");
        const activeCounter = `${counter}__active`;
        let activeStartedAt = document.visibilityState === "visible" ? Date.now() : 0;
        let activeCarryMs = 0;
        let activeTimer = null;

        function ping(name) {
          fetch(
            "https://api.counterapi.dev/v1/" +
              encodeURIComponent(namespace) +
              "/" +
              encodeURIComponent(name) +
              "/up",
            { method: "GET", keepalive: true }
          ).catch(() => {});
        }

        function flush(finalize = false) {
          if (!activeStartedAt) return;
          const now = Date.now();
          activeCarryMs += Math.max(0, now - activeStartedAt);
          activeStartedAt = now;

          while (activeCarryMs >= activeBucketMs) {
            ping(activeCounter);
            activeCarryMs -= activeBucketMs;
          }

          if (finalize && activeCarryMs >= activeBucketMs / 2) {
            ping(activeCounter);
            activeCarryMs = 0;
          }
        }

        function stop(finalize = false) {
          flush(finalize);
          activeStartedAt = 0;
          if (activeTimer) {
            clearInterval(activeTimer);
            activeTimer = null;
          }
        }

        function start() {
          if (document.visibilityState !== "visible" || activeTimer) return;
          activeStartedAt = Date.now();
          activeTimer = setInterval(() => flush(false), activeBucketMs);
        }

        document.addEventListener("visibilitychange", () => {
          if (document.visibilityState === "hidden") {
            stop(true);
            return;
          }

          start();
        });

        window.addEventListener("pagehide", () => stop(true));

        ping(counter);
        start();
      })();
    </script>
  </body>
</html>
